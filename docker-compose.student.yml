services:
  lab:
    # Replace this default with the public course image before publishing.
    image: "${LAB_IMAGE:-ghcr.io/your-org/linux-edge-lab:lab01}"
    working_dir: /work
    user: "${LAB_UID:-1000}:${LAB_GID:-1000}"
    environment:
      BUILDROOT_VERSION: "${BUILDROOT_VERSION:-2026.02.3}"
      BUILDROOT_DIR: "/opt/buildroot-${BUILDROOT_VERSION:-2026.02.3}"
      BUILDROOT_DL_DIR: /work/.cache/dl
      HOME: /tmp
    volumes:
      - .:/work
